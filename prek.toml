# Managed by copier — template baseline above, project-specific content below
default_stages = ["pre-commit"]
default_install_hook_types = ["pre-commit", "commit-msg"]

[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v6.0.0"

[[repos.hooks]]
id = "trailing-whitespace"
args = ["--markdown-linebreak-ext=md"]
priority = 0

[[repos.hooks]]
id = "end-of-file-fixer"
exclude = '\.jinja$'
priority = 0

[[repos.hooks]]
id = "check-toml"
priority = 0

[[repos.hooks]]
id = "check-yaml"
args = ["--allow-multiple-documents"]
priority = 0

[[repos.hooks]]
id = "check-json"
priority = 0

[[repos.hooks]]
id = "check-case-conflict"
priority = 0

[[repos.hooks]]
id = "mixed-line-ending"
args = ["--fix=lf"]
priority = 0

[[repos.hooks]]
id = "check-xml"
types = ["text"]
files = '\\.(xml|iml)$'
priority = 0

[[repos.hooks]]
id = "check-added-large-files"
args = ["--maxkb=500"]
priority = 0

[[repos.hooks]]
id = "check-merge-conflict"
stages = ["pre-commit", "pre-push"]
priority = 0

[[repos.hooks]]
id = "no-commit-to-branch"
name = "Block commits to main"
args = ["--branch", "main"]
stages = ["pre-commit", "pre-push"]
priority = 0

[[repos]]
repo = "https://github.com/editorconfig-checker/editorconfig-checker"
rev = "v3.6.1"

[[repos.hooks]]
id = "editorconfig-checker"
name = "Enforce .editorconfig rules"
priority = 0

[[repos]]
repo = "local"

[[repos.hooks]]
id = "lower-case-commit-title"
name = "Lowercase commit title"
stages = ["commit-msg"]
entry = "grep --basic-regexp --null-data --only-matching '^[a-z0-9!:() ]\\+'"
language = "system"
priority = 0

[[repos.hooks]]
id = "conventional-commit"
name = "Follows conventional commit format"
stages = ["commit-msg"]
entry = "cog verify --file"
language = "system"
priority = 0

[[repos.hooks]]
id = "nix-fmt"
name = "Format nix files"
entry = "nix fmt"
types = ["nix"]
language = "system"
priority = 0

[[repos.hooks]]
id = "no-duplicate-flake-inputs"
name = "No duplicate flake inputs (use follows)"
entry = "bash -c 'grep -o \"narHash.*\" flake.lock | sort | uniq -d | grep -q . && exit 1 || exit 0'"
language = "system"
files = '^flake\.lock$'
pass_filenames = false
priority = 0

[[repos.hooks]]
id = "block-yml-extension"
name = "Block .yml files (use .yaml instead)"
entry = "Rename *.yml files to end with *.yaml"
language = "fail"
types = ["text"]
files = '\\.yml$'
priority = 0


[[repos]]
repo = "https://github.com/rhysd/actionlint"
rev = "v1.7.11"

[[repos.hooks]]
id = "actionlint"
name = "Lint GitHub Actions workflows"
priority = 0

[[repos]]
repo = "https://github.com/python-jsonschema/check-jsonschema"
rev = "0.37.0"


[[repos.hooks]]
id = "check-github-actions"
name = "Validate GitHub Actions metadata"
priority = 0

[[repos.hooks]]
id = "check-github-workflows"
name = "Validate GitHub Workflows schema"
priority = 0

[[repos.hooks]]
id = "check-renovate"
name = "Validate Renovate config"
priority = 0

[[repos]]
repo = "https://github.com/gitleaks/gitleaks"
rev = "v8.30.0"

[[repos.hooks]]
id = "gitleaks"
name = "Detect hardcoded secrets"
priority = 0

